<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 35 565 290"
   font-family="Inter, 'SF Pro Display', system-ui, -apple-system, sans-serif"
   font-size="13"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.mono { font-family: 'Monaspace Neon', 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
.humanist { font-family: 'Monaspace Argon', 'Monaspace Argon Var', Inter, system-ui, sans-serif; }
.phase-label { font-family: 'Monaspace Argon', 'Monaspace Argon Var', Inter, system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #8a9aaa; letter-spacing: 1.5px; }
.box-title { font-family: 'Monaspace Argon', 'Monaspace Argon Var', Inter, system-ui, sans-serif; font-size: 15px; font-weight: 600; }
.item { font-size: 12px; fill: #1a2a3a; }
.service { font-family: 'Monaspace Argon', 'Monaspace Argon Var', Inter, system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #5a4a2a; }
.arrow { stroke: #5a7a9a; stroke-width: 1.5; stroke-opacity: 0.4; }
</style>
    <marker
       id="arr2"
       viewBox="0 0 10 7"
       refX="7"
       refY="3.5"
       markerWidth="5"
       markerHeight="3.5"
       orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5a7a9a" fill-opacity="0.4" />
    </marker>

    <!-- Logo symbols (each viewBox-normalized so callers can scale freely) -->
    <symbol id="logo-ss" viewBox="0 0 24 24">
      <path fill="#1857B6" d="M24 8.609c-.848.536-1.436.83-2.146 1.245-4.152 2.509-8.15 5.295-11.247 8.981l-1.488 1.817-4.568-7.268c1.021.814 3.564 3.098 4.603 3.599l3.356-2.526c2.336-1.644 8.946-5.226 11.49-5.848ZM8.046 15.201c.346.277.692.537.969.744.761-3.668.121-7.613-1.886-11.039 3.374-.052 6.731-.087 10.105-.139a14.794 14.794 0 0 1 1.298 5.295c.294-.156.588-.294.883-.433-.104-1.868-.641-3.91-1.662-6.263-4.602-.018-9.188-.018-13.79-.018 2.993 3.547 4.36 7.839 4.083 11.853Zm-.623-.484c.087.086.191.155.277.225-.138-3.409-1.419-6.887-3.824-9.881H1.73c3.098 2.855 4.984 6.299 5.693 9.656Zm-.744-.658c.104.087.208.173.329.277-.9-2.526-2.492-5.018-4.741-7.198H0c2.89 2.076 5.122 4.481 6.679 6.921Z"/>
    </symbol>
    <symbol id="logo-ssh" viewBox="0 0 24 24">
      <g fill="none" stroke="#2a3a4a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19h8" />
        <path d="m4 17 6-6-6-6" />
      </g>
    </symbol>
    <symbol id="logo-slack" viewBox="0 0 127 127">
      <path d="M27.2 80c0 7.3-5.9 13.2-13.2 13.2C6.7 93.2.8 87.3.8 80c0-7.3 5.9-13.2 13.2-13.2h13.2V80zm6.6 0c0-7.3 5.9-13.2 13.2-13.2 7.3 0 13.2 5.9 13.2 13.2v33c0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V80z" fill="#E01E5A"/>
      <path d="M47 27c-7.3 0-13.2-5.9-13.2-13.2C33.8 6.5 39.7.6 47 .6c7.3 0 13.2 5.9 13.2 13.2V27H47zm0 6.7c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H13.9C6.6 60.1.7 54.2.7 46.9c0-7.3 5.9-13.2 13.2-13.2H47z" fill="#36C5F0"/>
      <path d="M99.9 46.9c0-7.3 5.9-13.2 13.2-13.2 7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H99.9V46.9zm-6.6 0c0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V13.8C66.9 6.5 72.8.6 80.1.6c7.3 0 13.2 5.9 13.2 13.2v33.1z" fill="#2EB67D"/>
      <path d="M80.1 99.8c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V99.8h13.2zm0-6.6c-7.3 0-13.2-5.9-13.2-13.2 0-7.3 5.9-13.2 13.2-13.2h33.1c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H80.1z" fill="#ECB22E"/>
    </symbol>
    <symbol id="logo-github" viewBox="0 0 24 24">
      <path fill="#181717" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </symbol>
  </defs>

  <!-- ============================================================ -->
  <!-- YOUR MACHINE (left oval)                                      -->
  <!-- ============================================================ -->
  <rect x="20" y="40" width="280" height="245" rx="12"
        fill="#f8fbff" stroke="#3a86a8" stroke-width="2" />
  <text x="160" y="65" text-anchor="middle" class="box-title" fill="#2a5a7a">Your Machine</text>

  <text x="40" y="98" class="phase-label">BIP SKILLS</text>
  <text x="180" y="98" class="phase-label">CLI</text>

  <!-- ===== ROW 1 — Semantic Scholar ===== -->
  <g class="mono">
    <text x="40" y="125" class="item">/bip-lit</text>
    <text x="180" y="125" class="item">bip asta</text>
  </g>

  <!-- ===== ROW 2 — SSH ===== -->
  <g class="mono">
    <text x="40" y="150" class="item">/bip-scout</text>
    <text x="180" y="150" class="item">bip scout</text>
  </g>

  <!-- ===== ROW 3 — Slack ===== -->
  <g class="mono">
    <text x="40" y="175" class="item">/bip-digest</text>
    <text x="180" y="175" class="item">bip digest</text>
  </g>

  <!-- ===== ROWS 4-7 — GitHub ===== -->
  <g class="mono">
    <text x="40" y="200" class="item">/bip-issue-file</text>
    <text x="180" y="200" class="item">gh issue</text>

    <text x="40" y="217" class="item">/bip-pr-review</text>
    <text x="180" y="217" class="item">gh pr</text>

    <text x="40" y="234" class="item">/bip-checkin</text>
    <text x="180" y="234" class="item">bip checkin</text>

    <text x="40" y="251" class="item">/bip-board</text>
    <text x="180" y="251" class="item">bip board</text>
  </g>

  <text x="40" y="273" font-size="14" fill="#5a7a9a" letter-spacing="2">…</text>
  <text x="180" y="273" font-size="14" fill="#5a7a9a" letter-spacing="2">…</text>

  <!-- ============================================================ -->
  <!-- EXTERNAL APIS (right oval, with gap from left oval)            -->
  <!-- ============================================================ -->
  <rect x="325" y="40" width="220" height="245" rx="12"
        fill="#fdfaf3" stroke="#b07840" stroke-width="2" />
  <text x="435" y="65" text-anchor="middle" class="box-title" fill="#7a5a2a">External APIs</text>

  <text x="365" y="98" class="phase-label">SERVICES</text>

  <!-- Service logos + labels.  Logo size 22x22; left edge at x=365; vertical center matches text. -->
  <use href="#logo-ss"     x="365" y="108" width="22" height="22"/>
  <text x="395" y="125" class="service">Semantic Scholar</text>

  <use href="#logo-ssh"    x="365" y="133" width="22" height="22"/>
  <text x="395" y="150" class="service">SSH</text>

  <use href="#logo-slack"  x="365" y="158" width="22" height="22"/>
  <text x="395" y="175" class="service">Slack</text>

  <use href="#logo-github" x="365" y="208" width="22" height="22"/>
  <text x="395" y="225" class="service">GitHub</text>

  <!-- ============================================================ -->
  <!-- ARROWS (double-headed, semi-transparent)                      -->
  <!-- Arrow tips land just before each logo (logo left edge x=365). -->
  <!-- ============================================================ -->
  <!-- Row 1: bip asta ↔ Semantic Scholar -->
  <line x1="265" y1="121" x2="361" y2="119"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <!-- Row 2: bip scout ↔ SSH -->
  <line x1="265" y1="146" x2="361" y2="144"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <!-- Row 3: bip digest ↔ Slack -->
  <line x1="265" y1="171" x2="361" y2="169"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <!-- Rows 4-7: 4 arrows converging on GitHub logo (x=361, y=219) -->
  <line x1="265" y1="196" x2="361" y2="219"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <line x1="265" y1="213" x2="361" y2="219"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <line x1="265" y1="230" x2="361" y2="219"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
  <line x1="265" y1="247" x2="361" y2="219"
        class="arrow" marker-start="url(#arr2)" marker-end="url(#arr2)" />
</svg>
